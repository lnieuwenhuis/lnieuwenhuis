name: Update profile stats

on:
  schedule:
    # Run once daily at 03:17 UTC.
    - cron: "17 3 * * *"

  # Allow manual runs from the Actions tab.
  workflow_dispatch:

  # Regenerate immediately whenever this workflow is changed.
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-stats.yml"

permissions:
  contents: write

concurrency:
  group: update-profile-stats
  cancel-in-progress: true

jobs:
  generate-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v6

      - name: Generate GitHub stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&theme=dracula&include_all_commits=true&card_width=450"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&theme=dracula&layout=compact&langs_count=8&card_width=450"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated cards
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile/stats.svg profile/top-langs.svg

          if git diff --cached --quiet; then
            echo "No card changes to commit."
            exit 0
          fi

          git commit -m "Update profile statistics"
          git push
